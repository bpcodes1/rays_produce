<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
    <meta name="theme-color" content="#1a3d0e" />
    <script>
      // Restores the original path after the 404.html SPA redirect, so React
      // Router sees /about instead of /?redirect=%2Fabout on a hard refresh.
      (function () {
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get('redirect');
        if (redirect) {
          window.history.replaceState(null, '', redirect + window.location.hash);
        }
      })();
    </script>
    <title>Ray's Produce Inc. | Fresh Produce Distributor Salem, Oregon</title>
    <meta name="description" content="Ray's Produce Inc. is a family-owned fresh produce and food distributor in Salem, Oregon serving restaurants, retailers, and wholesalers across Oregon and Washington since 1996." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
